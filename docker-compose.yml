# ─────────────────────────────────────────────────────────────────────────────
# Linear Clone — Full Stack docker-compose
#
# Services:
#   postgres   → Database (port 5432 on host)
#   backend    → Express API (port 3000 on host)
#   frontend   → Nginx + React build (port 80 on host)
#
# Usage:
#   docker compose up -d --build          → build and start everything
#   docker compose logs -f backend        → stream backend logs
#   docker compose exec backend sh        → shell into backend container
#   docker compose down -v                → stop + remove volumes
#
# Required: copy backend/.env.example → backend/.env and fill in secrets.
# ─────────────────────────────────────────────────────────────────────────────

version: "3.9"

# Shared network so services can reach each other by name
networks:
  app_network:
    driver: bridge

services:

  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: linear_db
    restart: unless-stopped
    networks:
      - app_network
    environment:
      POSTGRES_USER:     ${POSTGRES_USER:-linear}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-linear_secret}
      POSTGRES_DB:       ${POSTGRES_DB:-linear_clone}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"   # exposed so Prisma Studio & local tools work
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-linear} -d ${POSTGRES_DB:-linear_clone}"]
      interval: 10s
      timeout:  5s
      retries:  5
      start_period: 15s

  # ── Backend API ─────────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: linear_backend
    restart: unless-stopped
    networks:
      - app_network

    # Load secrets from file, then override DB vars to use Docker hostnames
    env_file:
      - ./backend/.env
    environment:
      NODE_ENV: production
      PORT: 3000

      # Use the Docker service name "postgres" — never "localhost" inside compose
      DATABASE_URL: >-
        postgresql://${POSTGRES_USER:-linear}:${POSTGRES_PASSWORD:-linear_secret}@postgres:5432/${POSTGRES_DB:-linear_clone}?schema=public&connection_limit=10&pool_timeout=30

      DIRECT_URL: >-
        postgresql://${POSTGRES_USER:-linear}:${POSTGRES_PASSWORD:-linear_secret}@postgres:5432/${POSTGRES_DB:-linear_clone}?schema=public

      # Allow requests from the nginx frontend container and host browser
      CORS_ORIGIN: "http://localhost,http://frontend,http://localhost:${FRONTEND_PORT:-80}"

    ports:
      - "${BACKEND_PORT:-3000}:3000"

    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/health || exit 1"]
      interval: 30s
      timeout:  10s
      retries:  3
      start_period: 20s

  # ── Frontend (nginx + React build) ─────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # Baked into the JS bundle at build time
        VITE_API_URL: /api
    container_name: linear_frontend
    restart: unless-stopped
    networks:
      - app_network
    ports:
      - "${FRONTEND_PORT:-80}:80"

    # nginx proxies /api → http://backend:3000 (see frontend/nginx.conf)
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost/api/health || exit 1"]
      interval: 30s
      timeout:  10s
      retries:  3
      start_period: 10s

# ── Named volumes ───────────────────────────────────────────────────────────
volumes:
  pg_data:
    driver: local
